<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>카드 실적 관리</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #070b14;
    --surface: #0e1424;
    --surface2: #141a2e;
    --border: rgba(255,255,255,0.07);
    --border-bright: rgba(255,255,255,0.14);
    --text: #f0f4ff;
    --text2: #8892aa;
    --text3: #4a5568;
    --accent: #4f8ef7;
    --accent2: #7c3aed;
    --cyan: #06d6c7;
    --green: #10d4a0;
    --amber: #f5a623;
    --red: #f05c6e;
    --green-glow: rgba(16,212,160,0.15);
    --amber-glow: rgba(245,166,35,0.15);
    --red-glow: rgba(240,92,110,0.12);
    --radius: 18px;
  }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 60px;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 20% -10%, rgba(79,142,247,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 110%, rgba(124,58,237,0.10) 0%, transparent 55%);
    pointer-events: none; z-index: 0;
  }
  header {
    position: sticky; top: 0; z-index: 50;
    padding: 18px 20px 16px;
    background: rgba(7,11,20,0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .header-left h1 {
    font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800;
    background: linear-gradient(135deg, #f0f4ff 0%, #8aa8f7 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .header-left p { font-size: 11px; color: var(--text3); margin-top: 2px; letter-spacing: 0.8px; text-transform: uppercase; }
  .header-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--cyan); box-shadow: 0 0 8px var(--cyan);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.8)} }
  .container { max-width: 640px; margin: 0 auto; padding: 20px 16px; position: relative; z-index: 1; }
  .summary-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; margin-bottom: 20px; }
  .stat {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px; position: relative; overflow: hidden;
  }
  .stat::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--cyan)); opacity: .6;
  }
  .stat-label { font-size: 10px; color: var(--text3); margin-bottom: 8px; letter-spacing: .8px; text-transform: uppercase; font-weight: 600; }
  .stat-value { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 700; color: var(--text); letter-spacing: -.5px; }
  .stat-value.green { color: var(--green); }
  .stat-value.amber { color: var(--amber); }
  .tab-row { display: flex; gap: 6px; margin-bottom: 18px; overflow-x: auto; scrollbar-width: none; padding-bottom: 2px; }
  .tab-row::-webkit-scrollbar { display: none; }
  .tab {
    font-size: 12px; font-weight: 600; padding: 7px 18px; border-radius: 50px;
    border: 1px solid var(--border); background: transparent; color: var(--text2);
    cursor: pointer; white-space: nowrap; flex-shrink: 0; transition: all .2s; letter-spacing: .3px;
  }
  .tab:hover { border-color: var(--border-bright); color: var(--text); }
  .tab.active {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff; border-color: transparent;
    box-shadow: 0 4px 16px rgba(79,142,247,.3);
  }
  .cards-list { display: flex; flex-direction: column; gap: 12px; }
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 18px;
    transition: all .3s ease; position: relative; overflow: hidden;
    animation: cardIn .35s ease both;
  }
  @keyframes cardIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
  .card:nth-child(1){animation-delay:0s} .card:nth-child(2){animation-delay:.05s}
  .card:nth-child(3){animation-delay:.1s} .card:nth-child(4){animation-delay:.15s}
  .card:nth-child(5){animation-delay:.2s} .card:nth-child(6){animation-delay:.25s}
  .card:nth-child(7){animation-delay:.3s} .card:nth-child(8){animation-delay:.35s}
  .card:nth-child(9){animation-delay:.4s}
  .card:hover { border-color: var(--border-bright); transform: translateY(-1px); }
  .card.achieved {
    border-color: rgba(16,212,160,.3);
    background: linear-gradient(135deg, var(--surface) 0%, rgba(16,212,160,.06) 100%);
    box-shadow: 0 0 24px rgba(16,212,160,.08);
  }
  .card.achieved .card-name::after { content: ' ✓'; color: var(--green); font-size: 13px; }
  .card.achieved .benefit-text { border-left-color: var(--green); }
  .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .card-name { font-size: 14px; font-weight: 700; color: var(--text); letter-spacing: -.2px; }
  .badge { font-size: 10px; font-weight: 700; padding: 4px 10px; border-radius: 50px; letter-spacing: .5px; text-transform: uppercase; }
  .badge-ok { background: var(--green-glow); color: var(--green); border: 1px solid rgba(16,212,160,.25); }
  .badge-warn { background: var(--amber-glow); color: var(--amber); border: 1px solid rgba(245,166,35,.25); }
  .badge-fail { background: var(--red-glow); color: var(--red); border: 1px solid rgba(240,92,110,.2); }
  .progress-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--text2); margin-bottom: 8px; font-weight: 500; }
  .pct { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 12px; }
  .progress-bg { height: 6px; background: rgba(255,255,255,.06); border-radius: 4px; overflow: hidden; margin-bottom: 14px; }
  .progress-fill { height: 100%; border-radius: 4px; transition: width .6s cubic-bezier(.23,1,.32,1); }
  .fill-ok { background: linear-gradient(90deg, var(--accent), var(--cyan)); box-shadow: 0 0 8px rgba(79,142,247,.5); }
  .fill-warn { background: linear-gradient(90deg, var(--amber), #f7c46a); box-shadow: 0 0 8px rgba(245,166,35,.4); }
  .fill-done { background: linear-gradient(90deg, var(--green), #5effd8); box-shadow: 0 0 8px rgba(16,212,160,.5); }
  .info-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
  .info-chip { background: rgba(255,255,255,.04); border: 1px solid var(--border); border-radius: 8px; padding: 5px 10px; font-size: 11px; color: var(--text2); font-weight: 500; }
  .info-chip span { font-weight: 700; color: var(--text); }
  .info-chip.done { color: var(--green); border-color: rgba(16,212,160,.2); background: var(--green-glow); }
  .benefit-text { font-size: 11px; color: var(--text3); margin-bottom: 14px; padding: 8px 12px; background: rgba(255,255,255,.03); border-radius: 8px; border-left: 2px solid var(--accent); line-height: 1.5; }
  .input-row { display: flex; gap: 8px; align-items: center; }
  .input-row input {
    flex: 1; font-size: 13px; font-family: 'Noto Sans KR', sans-serif;
    padding: 9px 12px; border: 1px solid var(--border); border-radius: 10px;
    background: rgba(255,255,255,.04); color: var(--text); outline: none; transition: border-color .2s;
  }
  .input-row input:focus { border-color: rgba(79,142,247,.5); background: rgba(79,142,247,.05); }
  .input-row input::placeholder { color: var(--text3); }
  .btn-update {
    font-size: 12px; font-weight: 700; font-family: 'Noto Sans KR', sans-serif;
    padding: 9px 16px; border-radius: 10px; border: none;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff; cursor: pointer; white-space: nowrap; transition: opacity .2s, transform .1s;
  }
  .btn-update:active { transform: scale(.96); }
  .btn-edit { font-size: 11px; font-family: 'Noto Sans KR', sans-serif; padding: 4px 10px; border-radius: 7px; border: 1px solid var(--border); background: transparent; color: var(--text2); cursor: pointer; transition: all .2s; }
  .btn-edit:hover { border-color: var(--border-bright); color: var(--text); }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); backdrop-filter: blur(8px); z-index: 100; align-items: flex-end; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface2); border: 1px solid var(--border-bright); border-radius: 24px 24px 0 0; padding: 20px 20px 40px; width: 100%; max-width: 640px; max-height: 92vh; overflow-y: auto; }
  .modal-handle { width: 36px; height: 4px; background: var(--border-bright); border-radius: 2px; margin: 0 auto 18px; }
  .modal h3 { font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 700; margin-bottom: 18px; }
  .field { margin-bottom: 14px; }
  .field label { font-size: 11px; color: var(--text3); display: block; margin-bottom: 6px; font-weight: 600; letter-spacing: .6px; text-transform: uppercase; }
  .field input { width: 100%; font-size: 14px; font-family: 'Noto Sans KR', sans-serif; padding: 11px 14px; border: 1px solid var(--border); border-radius: 10px; background: rgba(255,255,255,.04); color: var(--text); outline: none; transition: border-color .2s; }
  .field input:focus { border-color: rgba(79,142,247,.5); background: rgba(79,142,247,.05); }
  .modal-btns { display: flex; gap: 10px; margin-top: 22px; }
  .btn-save { flex: 1; font-size: 14px; font-weight: 700; padding: 13px; border-radius: 12px; border: none; background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; box-shadow: 0 4px 20px rgba(79,142,247,.25); }
  .btn-cancel { flex: 1; font-size: 14px; padding: 13px; border-radius: 12px; border: 1px solid var(--border); background: transparent; color: var(--text2); cursor: pointer; font-family: 'Noto Sans KR', sans-serif; }
  .reset-btn { display: block; margin: 28px auto 0; font-size: 11px; color: var(--text3); background: none; border: none; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; letter-spacing: .5px; opacity: .7; transition: opacity .2s; }
  .reset-btn:hover { opacity: 1; }
  .empty { text-align: center; font-size: 13px; color: var(--text3); padding: 40px 0; }
  .ai-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 18px; position: relative; overflow: hidden; }
  .ai-box::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--cyan), var(--accent), var(--accent2)); }
  .ai-box-label { font-size: 11px; font-weight: 700; color: var(--cyan); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; letter-spacing: .5px; text-transform: uppercase; }
  .ai-input-row { display: flex; gap: 8px; }
  .ai-input-row textarea { flex: 1; padding: 10px 12px; border-radius: 10px; border: 1px solid var(--border); background: rgba(255,255,255,.04); color: var(--text); font-size: 13px; font-family: 'Noto Sans KR', sans-serif; resize: none; height: 50px; outline: none; transition: border-color .2s; line-height: 1.5; }
  .ai-input-row textarea:focus { border-color: rgba(6,214,199,.4); background: rgba(6,214,199,.04); }
  .ai-input-row textarea::placeholder { color: var(--text3); font-size: 12px; }
  .ai-send-btn { padding: 0 18px; border-radius: 10px; background: linear-gradient(135deg, #06d6c7, var(--accent)); color: #fff; border: none; font-size: 13px; font-weight: 700; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; white-space: nowrap; transition: opacity .15s; box-shadow: 0 4px 16px rgba(6,214,199,.25); }
  .ai-send-btn:disabled { opacity: .4; cursor: default; }
  .ai-result { margin-top: 10px; font-size: 12px; color: var(--text2); display: none; padding: 8px 12px; border-radius: 8px; background: rgba(255,255,255,.03); line-height: 1.6; }
  .ai-result.show { display: block; }
  .ai-result.error { color: var(--red); background: var(--red-glow); }
  .ai-hint { font-size: 10px; color: var(--text3); margin-top: 8px; }
  .ai-key-row { margin-top: 10px; display: flex; gap: 6px; align-items: center; }
  .ai-key-row input { flex: 1; padding: 7px 11px; border-radius: 8px; border: 1px solid var(--border); background: rgba(255,255,255,.04); color: var(--text); font-size: 11px; font-family: 'Noto Sans KR', sans-serif; outline: none; }
  .ai-key-row input::placeholder { color: var(--text3); }
  .ai-key-row button { padding: 7px 14px; border-radius: 8px; border: 1px solid var(--border); background: rgba(255,255,255,.06); color: var(--text2); font-size: 11px; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; font-weight: 600; }

  .btn-cancel-input { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 16px; padding: 4px 6px; line-height: 1; transition: color .2s; flex-shrink: 0; display: none; }
  .btn-cancel-input:hover { color: var(--red); }
  .btn-cancel-input.visible { display: block; }
  .undo-toast { display: none; align-items: center; gap: 8px; margin-top: 8px; padding: 8px 12px; background: rgba(245,166,35,.1); border: 1px solid rgba(245,166,35,.25); border-radius: 10px; font-size: 12px; color: var(--amber); }
  .undo-toast.show { display: flex; animation: fadeIn .2s ease; }
  .btn-undo { background: none; border: 1px solid rgba(245,166,35,.4); border-radius: 6px; color: var(--amber); font-size: 11px; font-weight: 700; padding: 3px 10px; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; transition: background .2s; }
  .btn-undo:hover { background: rgba(245,166,35,.15); }
  @keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
  #loadingScreen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 999; flex-direction: column; gap: 12px; }
  .loading-bar { width: 120px; height: 3px; background: rgba(255,255,255,.06); border-radius: 2px; overflow: hidden; }
  .loading-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--cyan)); border-radius: 2px; animation: loadAnim 1s ease-in-out infinite alternate; }
  @keyframes loadAnim { from{width:20%;margin-left:0} to{width:60%;margin-left:40%} }
  .loading-text { font-size: 12px; color: var(--text3); letter-spacing: 1px; }
</style>
</head>
<body>

<div id="loadingScreen">
  <div class="loading-bar"><div class="loading-bar-fill"></div></div>
  <div class="loading-text">불러오는 중</div>
</div>

<header>
  <div class="header-left">
    <h1>카드 실적</h1>
    <p id="headerDate"></p>
  </div>
  <div class="header-dot"></div>
</header>

<div class="container">
  <div class="summary-grid" id="summaryGrid"></div>

  <div class="ai-box">
    <div class="ai-box-label">✦ AI 금액 입력</div>
    <div class="ai-input-row">
      <textarea id="aiInput" placeholder="예: 신한1 15만, 하나 8만 썼어&#10;삼성 230000원 사용했어"></textarea>
      <button class="ai-send-btn" id="aiSendBtn" onclick="aiParse()">적용</button>
    </div>
    <div class="ai-result" id="aiResult"></div>
    <div class="ai-hint">💡 카드 이름과 금액을 자유롭게 입력하면 AI가 자동으로 반영해요</div>
    <div class="ai-key-row">
      <input type="password" id="aiKeyInput" placeholder="Anthropic API 키 (sk-ant-...)" />
      <button onclick="saveApiKey()">저장</button>
    </div>
  </div>

  <div class="tab-row" id="tabRow"></div>
  <div class="cards-list" id="cardsList"></div>
  <button class="reset-btn" onclick="confirmReset()">↺ 데이터 초기화</button>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <h3 id="modalTitle">카드 정보 수정</h3>
    <div class="field"><label>카드 이름</label><input id="mName" /></div>
    <div class="field"><label>월 실적 목표 (원)</label><input id="mTarget" type="number" /></div>
    <div class="field"><label>이번 달 사용 금액 (원)</label><input id="mUsed" type="number" /></div>
    <div class="field"><label>월 한도 (원)</label><input id="mLimit" type="number" /></div>
    <div class="field"><label>혜택 메모</label><input id="mBenefit" /></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-save" onclick="saveCard()">저장</button>
    </div>
  </div>
</div>

<script>
const KEY = 'card_tracker_v2';
const AI_KEY_STORE = 'card_ai_key';
let editIdx = null, currentFilter = 'all', aiKey = '';

const defaults = [
  { name: '신한카드 1', brand: '신한', target: 300000, used: 0, limit: 1000000, benefit: '실적 달성 시 혜택 제공' },
  { name: '신한카드 2', brand: '신한', target: 300000, used: 0, limit: 1000000, benefit: '실적 달성 시 혜택 제공' },
  { name: '신한카드 3', brand: '신한', target: 300000, used: 0, limit: 1000000, benefit: '실적 달성 시 혜택 제공' },
  { name: '신한카드 4', brand: '신한', target: 300000, used: 0, limit: 1000000, benefit: '실적 달성 시 혜택 제공' },
  { name: '신한카드 5', brand: '신한', target: 300000, used: 0, limit: 1000000, benefit: '실적 달성 시 혜택 제공' },
  { name: '신한카드 6', brand: '신한', target: 300000, used: 0, limit: 1000000, benefit: '실적 달성 시 혜택 제공' },
  { name: '신한카드 7', brand: '신한', target: 300000, used: 0, limit: 1000000, benefit: '실적 달성 시 혜택 제공' },
  { name: '하나카드 1', brand: '하나', target: 300000, used: 0, limit: 1000000, benefit: '실적 달성 시 캐시백' },
  { name: '삼성카드 1', brand: '삼성', target: 300000, used: 0, limit: 1000000, benefit: '실적 달성 시 포인트 적립' },
];

let cards = JSON.parse(JSON.stringify(defaults));

async function loadFromStorage() {
  try { const r = await window.storage.get(KEY); if (r?.value) cards = JSON.parse(r.value); } catch(e) {}
  try { const r = await window.storage.get(AI_KEY_STORE); if (r?.value) { aiKey = r.value; document.getElementById('aiKeyInput').placeholder = '키 저장됨 (변경하려면 새로 입력)'; } } catch(e) {}
}

async function save() { try { await window.storage.set(KEY, JSON.stringify(cards)); } catch(e) {} }

function fmt(n) { return Math.round(n).toLocaleString('ko-KR'); }
function pct(u, t) { return Math.min(100, Math.round((u/t)*100)); }
function status(u, t) { const p = pct(u,t); return p>=100?'ok':p>=60?'warn':'fail'; }

function renderDate() {
  const d = new Date();
  const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  document.getElementById('headerDate').textContent = `${months[d.getMonth()]} ${d.getFullYear()}`;
}

function renderSummary() {
  const achieved = cards.filter(c => c.used >= c.target).length;
  const totalRemain = cards.reduce((s,c) => s + Math.max(0, c.limit - c.used), 0);
  const needTotal = cards.filter(c => c.used < c.target).reduce((s,c) => s + (c.target - c.used), 0);
  document.getElementById('summaryGrid').innerHTML = `
    <div class="stat"><div class="stat-label">실적 달성</div><div class="stat-value green">${achieved}<span style="font-size:14px;opacity:.5"> / ${cards.length}</span></div></div>
    <div class="stat"><div class="stat-label">미달성</div><div class="stat-value amber">${cards.length - achieved}<span style="font-size:14px;opacity:.5">장</span></div></div>
    <div class="stat"><div class="stat-label">잔여 한도</div><div class="stat-value" style="font-size:18px">${fmt(totalRemain)}<span style="font-size:12px;opacity:.5">원</span></div></div>
    <div class="stat"><div class="stat-label">실적 필요</div><div class="stat-value" style="font-size:18px">${fmt(needTotal)}<span style="font-size:12px;opacity:.5">원</span></div></div>`;
}

function renderTabs() {
  const brands = ['all','신한','하나','삼성'];
  const labels = {all:'전체','신한':'신한','하나':'하나','삼성':'삼성'};
  const counts = {};
  cards.forEach(c => { counts[c.brand] = (counts[c.brand]||0)+1; });
  document.getElementById('tabRow').innerHTML = brands.map(b => {
    const cnt = b==='all' ? cards.length : (counts[b]||0);
    return `<button class="tab${currentFilter===b?' active':''}" onclick="filterCards('${b}')">${labels[b]} <span style="opacity:.6">${cnt}</span></button>`;
  }).join('');
}

function renderCards() {
  const filtered = currentFilter==='all' ? cards : cards.filter(c => c.brand===currentFilter);
  const list = document.getElementById('cardsList');
  if (!filtered.length) { list.innerHTML = '<div class="empty">해당 카드 없음</div>'; return; }
  list.innerHTML = filtered.map(c => {
    const idx = cards.indexOf(c);
    const p = pct(c.used, c.target), st = status(c.used, c.target);
    const remain = Math.max(0, c.limit - c.used), need = Math.max(0, c.target - c.used);
    const fillClass = st==='ok'?'fill-done':st==='warn'?'fill-warn':'fill-ok';
    const badgeClass = st==='ok'?'badge-ok':st==='warn'?'badge-warn':'badge-fail';
    const badgeText = st==='ok'?'DONE':st==='warn'?'IN PROGRESS':'PENDING';
    const pctColor = st==='ok'?'var(--green)':st==='warn'?'var(--amber)':'var(--accent)';
    return `<div class="card${st==='ok'?' achieved':''}">
      <div class="card-header">
        <div class="card-name">${c.name}</div>
        <div style="display:flex;gap:8px;align-items:center">
          <span class="badge ${badgeClass}">${badgeText}</span>
          <button class="btn-edit" onclick="openModal(${idx})">수정</button>
        </div>
      </div>
      <div class="progress-labels">
        <span>${fmt(c.used)}원 사용</span>
        <span class="pct" style="color:${pctColor}">${p}%</span>
      </div>
      <div class="progress-bg"><div class="progress-fill ${fillClass}" style="width:${p}%"></div></div>
      <div class="info-row">
        <div class="info-chip">목표 <span>${fmt(c.target)}원</span></div>
        <div class="info-chip">한도잔여 <span>${fmt(remain)}원</span></div>
        ${need>0?`<div class="info-chip">필요 <span style="color:var(--amber)">${fmt(need)}원</span></div>`:`<div class="info-chip done">✓ 실적 달성!</div>`}
      </div>
      ${c.benefit?`<div class="benefit-text">${c.benefit}</div>`:''}
      <div class="input-row">
        <input type="number" id="quick_${idx}" placeholder="사용금액 입력" value="${c.used||''}" oninput="onQuickInput(${idx}, this)"/>
        <button class="btn-cancel-input" id="cancel_${idx}" onclick="cancelInput(${idx})" title="취소">✕</button>
        <button class="btn-update" onclick="quickUpdate(${idx})">적용</button>
      </div>
      <div class="undo-toast" id="undo_${idx}">
        <span>적용됐어요</span>
        <button class="btn-undo" onclick="undoUpdate(${idx})">되돌리기</button>
      </div>
    </div>`;
  }).join('');
}

function render() { renderDate(); renderSummary(); renderTabs(); renderCards(); }
function filterCards(brand) { currentFilter = brand; render(); }

let undoStack = {};
let undoTimers = {};

function onQuickInput(idx, input) {
  const cancelBtn = document.getElementById(`cancel_${idx}`);
  if (cancelBtn) {
    const original = cards[idx].used;
    const current = parseInt(input.value);
    cancelBtn.classList.toggle('visible', !isNaN(current) && current !== original);
  }
}

function cancelInput(idx) {
  const input = document.getElementById(`quick_${idx}`);
  const cancelBtn = document.getElementById(`cancel_${idx}`);
  if (input) input.value = cards[idx].used || '';
  if (cancelBtn) cancelBtn.classList.remove('visible');
}

async function undoUpdate(idx) {
  if (undoStack[idx] !== undefined) {
    cards[idx].used = undoStack[idx];
    delete undoStack[idx];
    clearTimeout(undoTimers[idx]);
    await save();
    render();
  }
}

function showUndo(idx) {
  const toast = document.getElementById(`undo_${idx}`);
  if (!toast) return;
  toast.classList.add('show');
  clearTimeout(undoTimers[idx]);
  undoTimers[idx] = setTimeout(() => {
    toast.classList.remove('show');
    delete undoStack[idx];
  }, 5000);
}

async function quickUpdate(idx) {
  const v = parseInt(document.getElementById(`quick_${idx}`).value);
  if (!isNaN(v) && v >= 0) {
    undoStack[idx] = cards[idx].used;
    cards[idx].used = v;
    await save();
    render();
    showUndo(idx);
  }
}

function openModal(idx) {
  editIdx = idx; const c = cards[idx];
  document.getElementById('mName').value = c.name;
  document.getElementById('mTarget').value = c.target;
  document.getElementById('mUsed').value = c.used;
  document.getElementById('mLimit').value = c.limit;
  document.getElementById('mBenefit').value = c.benefit;
  document.getElementById('modalTitle').textContent = c.name;
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); editIdx = null; }
function handleOverlayClick(e) { if (e.target===document.getElementById('modalOverlay')) closeModal(); }

async function saveCard() {
  if (editIdx===null) return;
  const name = document.getElementById('mName').value.trim();
  cards[editIdx].name = name || cards[editIdx].name;
  cards[editIdx].target = parseInt(document.getElementById('mTarget').value)||0;
  cards[editIdx].used = parseInt(document.getElementById('mUsed').value)||0;
  cards[editIdx].limit = parseInt(document.getElementById('mLimit').value)||0;
  cards[editIdx].benefit = document.getElementById('mBenefit').value.trim();
  const n = cards[editIdx].name;
  cards[editIdx].brand = n.includes('하나')?'하나':n.includes('삼성')?'삼성':'신한';
  await save(); closeModal(); render();
}

async function confirmReset() {
  if (confirm('모든 데이터를 초기화할까요?')) { cards = JSON.parse(JSON.stringify(defaults)); await save(); render(); }
}

async function saveApiKey() {
  const k = document.getElementById('aiKeyInput').value.trim();
  if (!k) return;
  aiKey = k;
  try { await window.storage.set(AI_KEY_STORE, k); } catch(e) {}
  document.getElementById('aiKeyInput').value = '';
  document.getElementById('aiKeyInput').placeholder = '키 저장됨 (변경하려면 새로 입력)';
  showAiResult('✅ API 키 저장됐어요! 어떤 기기에서든 사용 가능해요.', false);
}

document.getElementById('aiInput').addEventListener('keydown', e => {
  if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); aiParse(); }
});

function showAiResult(msg, isError) {
  const el = document.getElementById('aiResult');
  el.textContent = msg;
  el.className = 'ai-result show' + (isError?' error':'');
}

async function aiParse() {
  const text = document.getElementById('aiInput').value.trim();
  if (!text) return;
  if (!aiKey) { showAiResult('❗ API 키를 먼저 입력해주세요!', true); return; }
  const btn = document.getElementById('aiSendBtn');
  btn.disabled = true; btn.textContent = '...';
  showAiResult('AI 분석 중...', false);
  const cardNames = cards.map((c,i) => i+': '+c.name).join('\n');
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type':'application/json', 'x-api-key':aiKey, 'anthropic-version':'2023-06-01', 'anthropic-dangerous-direct-browser-access':'true' },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001', max_tokens: 500,
        messages: [{ role:'user', content:'카드 목록 (인덱스: 이름):\n'+cardNames+'\n\n입력: "'+text+'"\n\n규칙:\n1. 카드 이름과 금액이 같이 있으면 해당 카드에 반영\n2. 금액만 있고 카드 이름이 없으면 idx는 -1로 반환\n3. 만=10000배, 천=1000배. 부분 일치로 카드 찾기\n형식: [{"idx":숫자,"amount":숫자}] JSON만 출력.' }]
      })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    const parsed = JSON.parse(data.content[0].text.trim().replace(/```json|```/g,'').trim());
    if (!Array.isArray(parsed)||!parsed.length) { showAiResult('❗ 인식 못했어요. 다시 입력해봐요!', true); return; }
    const results = [];
    parsed.forEach(item => {
      let idx = item.idx;
      if (idx===-1) { const f = currentFilter==='all'?cards:cards.filter(c=>c.brand===currentFilter); idx = cards.indexOf(f[0]); }
      if (idx>=0 && idx<cards.length && !isNaN(item.amount)) { cards[idx].used = item.amount; results.push(cards[idx].name+' → '+fmt(item.amount)+'원'); }
    });
    await save(); render();
    document.getElementById('aiInput').value = '';
    showAiResult('✅ 반영 완료: '+results.join(', '), false);
  } catch(e) {
    showAiResult('❗ 오류: '+e.message, true);
  } finally {
    btn.disabled = false; btn.textContent = '적용';
  }
}

(async () => {
  await loadFromStorage();
  render();
  document.getElementById('loadingScreen').style.display = 'none';
})();
</script>
</body>
</html>
